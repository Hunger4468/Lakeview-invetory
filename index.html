<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lakeview Firearms — Inventory Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0b429">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LF Inventory">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1f2e;
    --surface: #242b3d;
    --surface2: #2e3750;
    --border: #3d4d6b;
    --accent: #f0b429;
    --accent2: #ffd166;
    --red: #ff5c5c;
    --green: #3ddc84;
    --blue: #4da6ff;
    --text: #f0f4ff;
    --muted: #8899bb;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; font-size: 14px; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0 20px; display: flex; align-items: center;
    justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
  .logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* SYNC PILL */
  .sync-pill {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px;
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    color: var(--muted); background: var(--surface2); cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .sync-pill:hover { border-color: var(--accent); color: var(--accent); }
  .sync-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sync-pill.connected { border-color: var(--green); color: var(--green); }
  .sync-pill.connected .dot { background: var(--green); }
  .sync-pill.syncing .dot { background: var(--accent); animation: pulse 1s infinite; }
  .sync-pill.error { border-color: var(--red); color: var(--red); }
  .sync-pill.error .dot { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  nav { display: flex; gap: 4px; }
  nav button {
    background: none; border: 1px solid transparent; color: var(--muted);
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
    padding: 7px 14px; cursor: pointer; border-radius: 4px; transition: all 0.15s; text-transform: uppercase;
  }
  nav button:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* VIEWS */
  .view { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
  .view.active { display: block; }

  /* SETUP BANNER */
  .setup-banner {
    background: linear-gradient(135deg, rgba(240,180,41,0.12), rgba(240,180,41,0.05));
    border: 1px solid rgba(240,180,41,0.5); border-radius: 8px;
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .setup-banner .icon { font-size: 26px; flex-shrink: 0; }
  .setup-banner .text { flex: 1; min-width: 200px; }
  .setup-banner .text strong { display: block; font-size: 14px; color: var(--accent); margin-bottom: 3px; }
  .setup-banner .text small { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 18px 16px; border-radius: 8px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card .label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .stat-card .value { font-family: var(--font-display); font-size: 36px; color: var(--accent); line-height: 1; }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.blue { color: var(--blue); }

  /* TOOLBAR & BUTTONS */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-box {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 13px; padding: 9px 14px;
    border-radius: 6px; flex: 1; min-width: 180px; outline: none; transition: border-color 0.15s;
  }
  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--accent); background: var(--surface2); }

  .btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
    padding: 9px 16px; cursor: pointer; border-radius: 6px; text-transform: uppercase;
    transition: all 0.15s; white-space: nowrap; font-weight: 500;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,180,41,0.08); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn.danger { color: var(--red); border-color: var(--red); background: none; }
  .btn.danger:hover { background: rgba(255,92,92,0.12); }
  .btn.drive { background: rgba(77,166,255,0.1); border-color: var(--blue); color: var(--blue); }
  .btn.drive:hover { background: rgba(77,166,255,0.2); }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  thead tr { background: var(--surface2); }
  th {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); padding: 13px 16px; text-align: left; border-bottom: 2px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  th:hover { color: var(--accent); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; background: var(--surface); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .barcode-cell { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .qty-badge { display: inline-block; font-family: var(--font-mono); font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 4px; min-width: 40px; text-align: center; }
  .qty-ok { background: rgba(61,220,132,0.18); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
  .qty-low { background: rgba(255,92,92,0.18); color: var(--red); border: 1px solid rgba(255,92,92,0.3); }
  .qty-warn { background: rgba(240,180,41,0.18); color: var(--accent); border: 1px solid rgba(240,180,41,0.3); }
  .action-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; border-radius: 5px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,180,41,0.1); }
  .icon-btn.del:hover { border-color: var(--red); color: var(--red); background: rgba(255,92,92,0.1); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex !important; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 28px; width: 100%; max-width: 480px; position: relative; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal h2 { font-family: var(--font-display); font-size: 24px; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    padding: 10px 13px; border-radius: 6px; outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); background: var(--bg); }
  .form-group select option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .close-btn { position: absolute; top: 16px; right: 18px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; transition: color 0.15s; }
  .close-btn:hover { color: var(--text); }

  /* SCAN VIEW */
  .scan-wrapper { max-width: 500px; margin: 0 auto; }
  .scan-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .scan-card h3 { font-family: var(--font-display); font-size: 20px; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; }

  #qr-reader { width: 100%; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); background: #000; }
  /* Override html5-qrcode default styles */
  #qr-reader__scan_region { background: #000 !important; }
  #qr-reader__dashboard { background: var(--surface2) !important; border-top: 1px solid var(--border) !important; padding: 10px !important; }
  #qr-reader__dashboard_section_csr button,
  #qr-reader__dashboard_section_fsr button {
    background: var(--accent) !important; color: #000 !important; border: none !important;
    font-family: var(--font-mono) !important; font-size: 11px !important; letter-spacing: 1px !important;
    font-weight: 700 !important; padding: 8px 16px !important; border-radius: 5px !important; cursor: pointer !important;
    text-transform: uppercase !important;
  }
  #qr-reader__dashboard_section_swaplink { color: var(--blue) !important; font-family: var(--font-mono) !important; font-size: 11px !important; }
  #qr-reader__status_span { color: var(--muted) !important; font-family: var(--font-mono) !important; font-size: 11px !important; }
  #qr-reader select { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 4px !important; padding: 4px 8px !important; font-family: var(--font-mono) !important; font-size: 11px !important; }
  #qr-reader img { display: none !important; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; white-space: nowrap; }

  .manual-input-row { display: flex; gap: 8px; }
  .manual-input-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 14px; padding: 10px 13px; border-radius: 6px; outline: none;
    transition: border-color 0.15s;
  }
  .manual-input-row input:focus { border-color: var(--accent); background: var(--bg); }
  #notFoundMsg {
    background: rgba(255,92,92,0.12); border: 1px solid rgba(255,92,92,0.5);
    color: var(--red); font-family: var(--font-mono); font-size: 12px;
    padding: 10px 14px; border-radius: 6px; margin-top: 10px; display: none;
  }

  /* SCAN RESULT */
  .scan-result { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-top: 12px; }
  .scan-result .item-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .scan-result .item-meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .txn-type-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .txn-btn {
    flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-family: var(--font-mono);
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; font-weight: 600;
  }
  .txn-btn.active-in { background: rgba(61,220,132,0.15); border-color: var(--green); color: var(--green); }
  .txn-btn.active-out { background: rgba(255,92,92,0.15); border-color: var(--red); color: var(--red); }
  .adj-row { display: flex; align-items: center; gap: 12px; }
  .adj-row .qty-display { font-family: var(--font-display); font-size: 44px; color: var(--accent); min-width: 64px; text-align: center; line-height: 1; }
  .adj-row .adj-btn {
    background: var(--surface); border: 2px solid var(--border); color: var(--text);
    font-size: 22px; width: 44px; height: 44px; border-radius: 6px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .adj-row .adj-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,180,41,0.1); }

  /* LOG VIEW */
  .log-entry {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; transition: border-color 0.15s;
  }
  .log-entry:hover { border-color: var(--border); background: var(--surface2); }
  .log-dir { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 1px; min-width: 32px; text-align: center; }
  .log-dir.in { color: var(--green); }
  .log-dir.out { color: var(--red); }
  .log-dir.adj { color: var(--accent); }
  .log-info { flex: 1; }
  .log-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .log-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
  .log-qty { font-family: var(--font-display); font-size: 24px; min-width: 44px; text-align: right; }

  /* DRIVE MODAL */
  .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); word-break: break-all; margin: 8px 0; user-select: all; cursor: text; }
  .step-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 11px; font-weight: 700; flex-shrink: 0; margin-right: 10px; }
  .step-row { display: flex; align-items: flex-start; margin-bottom: 14px; line-height: 1.6; }
  .step-row p { font-size: 13px; color: var(--text); }
  .step-row small { font-family: var(--font-mono); font-size: 11px; color: var(--muted); display: block; margin-top: 3px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.5px;
    padding: 11px 22px; border-radius: 8px; z-index: 999;
    transition: transform 0.25s ease; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); background: rgba(61,220,132,0.1); }
  #toast.error { border-color: var(--red); color: var(--red); background: rgba(255,92,92,0.1); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px; }
  .empty .icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }

  @media (max-width: 640px) {
  #salesSplitGrid { grid-template-columns: 1fr !important; }
    header { padding: 0 10px; }
    .logo { font-size: 16px; }
    .view { padding: 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    td, th { padding: 10px 10px; }
    .hide-mobile { display: none !important; }
    nav button { font-size: 10px; padding: 6px 8px; }
    .sync-pill span { display: none; }
  }

  /* SALES */
  .sales-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .sale-row { display: flex; align-items: center; gap: 14px; padding: 13px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; transition: background 0.15s; }
  .sale-row:hover { background: var(--surface2); }
  .sale-method { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .sale-method.cash { background: rgba(61,220,132,0.15); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
  .sale-method.venmo { background: rgba(77,166,255,0.15); color: var(--blue); border: 1px solid rgba(77,166,255,0.3); }
  .sale-info { flex: 1; min-width: 0; }
  .sale-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sale-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
  .sale-amounts { text-align: right; }
  .sale-revenue { font-family: var(--font-display); font-size: 20px; color: var(--green); line-height: 1; }
  .sale-profit { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .chart-wrap h3 { font-family: var(--font-display); font-size: 16px; letter-spacing: 2px; color: var(--accent); margin-bottom: 16px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-col .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
  .bar-col .bar.venmo-bar { background: var(--blue); }
  .bar-col .bar-label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); text-align: center; }
  .bar-col .bar-val { font-family: var(--font-mono); font-size: 9px; color: var(--text); }
  .date-filter { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .date-filter label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .date-filter input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 7px 10px; border-radius: 5px; outline: none; }
  .date-filter input:focus { border-color: var(--accent); }
  .filter-btn { font-size: 10px !important; padding: 7px 12px !importa
